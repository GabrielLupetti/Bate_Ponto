<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Ponto Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen text-gray-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Meu Controle de Ponto</h1>
                <p class="text-sm text-gray-500">Conexão direta com o Google Sheets</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-4">
                <input type="date" id="date-input" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 p-2.5 shadow-inner font-semibold">
                <div id="relogio" class="text-xl font-mono font-bold bg-gray-900 text-emerald-400 px-4 py-2 rounded-xl shadow-md">00:00:00</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <span class="w-2 h-4 bg-blue-600 rounded-full"></span> Registrar Horário
                </h2>
                
                <div class="flex flex-col gap-3">
                    <button onclick="registrarPonto('checkin')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm flex justify-between items-center">
                        <span>Fazer Check-in</span>
                        <span class="text-xs bg-emerald-500 px-2 py-1 rounded">Entrada</span>
                    </button>
                    
                    <button onclick="registrarPonto('pausa')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm flex justify-between items-center">
                        <span>Pausa Almoço</span>
                        <span class="text-xs bg-amber-400 px-2 py-1 rounded">Saída Almoço</span>
                    </button>
                    
                    <button onclick="registrarPonto('retorno')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm flex justify-between items-center">
                        <span>Retorno Almoço</span>
                        <span class="text-xs bg-indigo-500 px-2 py-1 rounded">Volta Almoço</span>
                    </button>
                    
                    <button onclick="registrarPonto('checkout')" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm flex justify-between items-center">
                        <span>Fazer Check-out</span>
                        <span class="text-xs bg-rose-500 px-2 py-1 rounded">Saída</span>
                    </button>
                </div>
                
                <p id="status-envio" class="text-center text-sm font-medium mt-4 text-gray-500 hidden"></p>
            </div>

            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Dias Registrados</p>
                        <p id="card-total-dias" class="text-3xl font-bold text-gray-900 mt-1">--</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Última Entrada</p>
                        <p id="card-ultimo-checkin" class="text-3xl font-bold text-emerald-600 mt-1">--:--</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Última Saída</p>
                        <p id="card-ultimo-checkout" class="text-3xl font-bold text-rose-600 mt-1">--:--</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex-1">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                            <span class="w-2 h-4 bg-emerald-500 rounded-full"></span> Histórico de Registros
                        </h2>
                        <button onclick="carregarDadosDashboard()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-1.5 px-3 rounded-lg border border-gray-200 transition">
                            Atualizar Tabela
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto max-h-80 overflow-y-auto">
                        <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0 border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-3">Data</th>
                                    <th class="px-6 py-3">Entrada</th>
                                    <th class="px-6 py-3">Almoço</th>
                                    <th class="px-6 py-3">Retorno</th>
                                    <th class="px-6 py-3">Saída</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-historico">
                                <tr>
                                    <td colspan="5" class="px-6 py-8 text-center text-gray-400">Carregando dados da planilha...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SUBSTUIA AQUI PELA SUA URL DO APPS SCRIPT
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwl5haXOIkaQ8nyg1xYHq9bBRWTmlUEhb0kAytd0DZ8UT7wMsZjj9LLdJ8eOIgK31WwVg/exec";

        const dateInput = document.getElementById('date-input');
        const statusEnvio = document.getElementById('status-envio');

        // Configurações Iniciais ao Carregar a Página
        window.onload = function() {
            // Define o input de data para o dia atual no fuso local do navegador
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            dateInput.value = `${ano}-${mes}-${dia}`;

            // Inicia o relógio em tempo real
            setInterval(atualizarRelogio, 1000);

            // Carrega os dados do dashboard vindos da planilha
            carregarDadosDashboard();
        };

        // Relógio digital do cabeçalho
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
        }

        // FUNÇÃO 1: Envia o ponto clicado para a Planilha (POST)
        function registrarPonto(acao) {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("SUA_URL")) {
                alert("Por favor, configure a URL do seu Apps Script no código HTML.");
                return;
            }

            statusEnvio.classList.remove('hidden', 'text-emerald-600', 'text-rose-600');
            statusEnvio.classList.add('text-gray-600');
            statusEnvio.innerText = "Registrando na planilha... Aguarde.";

            const timestamp = new Date().toISOString();

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Evita restrições de CORS do Google
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    acao: acao,
                    data: dateInput.value,
                    hora_exata: timestamp
                })
            })
            .then(() => {
                statusEnvio.classList.remove('text-gray-600');
                statusEnvio.classList.add('text-emerald-600');
                statusEnvio.innerText = `Sucesso! '${acao}' computado.`;
                
                // Aguarda 2 segundos e atualiza o dashboard para puxar a nova linha da planilha
                setTimeout(() => {
                    statusEnvio.classList.add('hidden');
                    carregarDadosDashboard();
                }, 2000);
            })
            .catch(err => {
                console.error('Erro ao enviar:', err);
                statusEnvio.classList.remove('text-gray-600');
                statusEnvio.classList.add('text-rose-600');
                statusEnvio.innerText = "Erro ao registrar. Verifique o console.";
            });
        }

        // FUNÇÃO 2: Busca todos os registros para alimentar o Dashboard (GET)
        function carregarDadosDashboard() {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("SUA_URL")) return;

            fetch(APPS_SCRIPT_URL)
            .then(response => response.json())
            .then(resultado => {
                if (resultado.status === "success") {
                    construirDashboard(resultado.dados);
                } else {
                    console.error("Erro no Apps Script:", resultado.message);
                }
            })
            .catch(err => {
                console.error("Erro ao carregar banco de dados:", err);
            });
        }

        // FUNÇÃO 3: Processa os dados recebidos e monta os componentes visuais
        function construirDashboard(dados) {
            const tabelaBody = document.getElementById('tabela-historico');
            
            // Se a planilha estiver vazia
            if (!dados || dados.length === 0) {
                tabelaBody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Nenhum registro encontrado na planilha.</td></tr>`;
                document.getElementById('card-total-dias').innerText = "0";
                return;
            }

            // Atualiza os Cards Superiores baseados nos dados reais
            document.getElementById('card-total-dias').innerText = dados.length;
            
            // Pega o último registro adicionado (mais recente)
            const ultimoRegistro = dados[dados.length - 1];
            document.getElementById('card-ultimo-checkin').innerText = ultimoRegistro.checkin || "--:--";
            document.getElementById('card-ultimo-checkout').innerText = ultimoRegistro.checkout || "--:--";

            // Monta as linhas da tabela de histórico (em ordem inversa para o mais novo aparecer no topo)
            let htmlLinhas = "";
            for (let i = dados.length - 1; i >= 0; i--) {
                const item = dados[i];
                htmlLinhas += `
                    <tr class="bg-white border-b border-gray-100 hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-semibold text-gray-900">${item.data}</td>
                        <td class="px-6 py-4 text-emerald-600 font-medium">${item.checkin || '-'}</td>
                        <td class="px-6 py-4 text-amber-600">${item.pausa || '-'}</td>
                        <td class="px-6 py-4 text-indigo-600">${item.retorno || '-'}</td>
                        <td class="px-6 py-4 text-rose-600 font-medium">${item.checkout || '-'}</td>
                    </tr>
                `;
            }
            tabelaBody.innerHTML = htmlLinhas;
        }
    </script>
</body>
</html>
